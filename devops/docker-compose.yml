version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: devops/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/studyplanner
      - JWT_SECRET=study-planner-secret-key-2024
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - planner-network

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - planner-network

volumes:
  mongo-data:

networks:
  planner-network:
    driver: bridge
